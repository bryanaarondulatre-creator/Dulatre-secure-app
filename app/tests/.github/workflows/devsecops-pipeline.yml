name: DevSecOps Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-scan-dependencies:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run Safety Check
        uses: pyupio/safety@2.3.5
        with:
          args: check -r requirements.txt --full-report
      
      - name: Run Bandit Security Linter
        run: |
          pip install bandit
          bandit -r app/ -f json -o bandit-report.json || true
      
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: security-scan-dependencies
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run Unit Tests
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing
          pytest tests/ --junitxml=test-results.xml
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  container-build-scan:
    name: Container Build and Vulnerability Scan
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: secure-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: secure-app:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
      
      - name: Run Docker Scout
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: secure-app:latest
          only-severities: critical,high

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: container-build-scan
    if: success()
    steps:
      - name: Deployment Simulation
        run: |
          echo "===== DEPLOYMENT SUCCESSFUL ====="
          echo "Image: secure-app:latest"
          echo "Status: All security checks passed"
          echo "Unit tests: All passed"
          echo "Container vulnerabilities: None found"
          echo "================================="
